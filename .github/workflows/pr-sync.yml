name: Sync PR to Gitea

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  sync-to-gitea:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get modified files from PR
        id: modified-files
        run: |
          # Get the list of modified files in the PR or from workflow_dispatch
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            MODIFIED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          else
            # For workflow_dispatch, get files from the last commit
            MODIFIED_FILES=$(git diff --name-only HEAD~1..HEAD)
          fi
          echo "Files modified:"
          echo "$MODIFIED_FILES"
          # Store for later use
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$MODIFIED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone Gitea repository
        run: |
          git clone https://${{ secrets.GITEA_OWNER }}:${{ secrets.GITEA_TOKEN }}@git.linux.toys/psygreg/scripts.git gitea-repo
        env:
          GITEA_OWNER: ${{ secrets.GITEA_OWNER }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Sync modified files to Gitea
        run: |
          # Copy modified files from GitHub to Gitea repo
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Syncing file: $file"
              mkdir -p "gitea-repo/$(dirname "$file")"
              cp "$file" "gitea-repo/$file"
            fi
          done <<< "${{ steps.modified-files.outputs.files }}"

      - name: Commit and push to Gitea
        run: |
          cd gitea-repo
          
          # Stage all modified and new files
          git add -A
          
          # Check if there are changes to commit
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to push"
            exit 0
          fi
          
          # Create appropriate commit message
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMIT_MSG="Sync PR #${{ github.event.pull_request.number }} from GitHub: ${{ github.event.pull_request.title }}"
          else
            COMMIT_MSG="Sync from GitHub via workflow_dispatch"
          fi
          
          git commit -m "$COMMIT_MSG"
          git push origin main
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

