name: Sync PR to Gitea

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  sync-to-gitea:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone Gitea repository
        run: |
          git clone https://${{ secrets.GITEA_OWNER }}:${{ secrets.GITEA_TOKEN }}@git.linux.toys/psygreg/scripts.git gitea-repo
        env:
          GITEA_OWNER: ${{ secrets.GITEA_OWNER }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Cherry-pick commits to Gitea
        run: |
          cd gitea-repo
          
          # Add GitHub as remote
          git remote add github https://github.com/psygreg/scripts.git
          git fetch github
          
          # Determine commits to cherry-pick based on event type
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "Cherry-picking commits from PR #${{ github.event.pull_request.number }}..."
            git cherry-pick ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
          else
            echo "Cherry-picking the last commit from GitHub..."
            git cherry-pick github/main -n
          fi
          
          # Verify changes
          echo "Changes after cherry-pick:"
          git log --oneline -5

      - name: Push to Gitea
        run: |
          cd gitea-repo
          git push origin main
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
