name: Sync PR to Gitea

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  sync-to-gitea:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate git diff
        id: diff
        run: |
          # Generate diff based on event type
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > /tmp/changes.diff
          else
            # For workflow_dispatch, get diff from the last commit
            git diff HEAD~1..HEAD > /tmp/changes.diff
          fi
          
          # Show the diff for debugging
          echo "Generated diff:"
          cat /tmp/changes.diff
          
          # Check if diff is not empty
          if [ -s /tmp/changes.diff ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone Gitea repository
        run: |
          git clone https://${{ secrets.GITEA_OWNER }}:${{ secrets.GITEA_TOKEN }}@git.linux.toys/psygreg/scripts.git gitea-repo
        env:
          GITEA_OWNER: ${{ secrets.GITEA_OWNER }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Apply diff to Gitea repository
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          cd gitea-repo
          
          # Apply the diff
          echo "Applying changes from diff..."
          git apply /tmp/changes.diff
          
          # Verify changes were applied
          echo "Changes after applying diff:"
          git status

      - name: Commit and push to Gitea
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          cd gitea-repo
          
          # Stage all changes
          git add -A
          
          # Create appropriate commit message
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMIT_MSG="Sync PR #${{ github.event.pull_request.number }} from GitHub: ${{ github.event.pull_request.title }}"
          else
            COMMIT_MSG="Sync from GitHub via workflow_dispatch"
          fi
          
          git commit -m "$COMMIT_MSG"
          git push origin main
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

